apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-adapter
  namespace: argocd
  labels:
    app: monitoring
spec:
  destination:
    name: ''
    namespace: monitoring
    server: 'https://kubernetes.default.svc'
  sources:
    - repoURL: "oci://ghcr.io/prometheus-community/charts"
      targetRevision: 5.3.0
      chart: prometheus-adapter
      helm:
        valueFiles:
          - $my-values/04-monitoring/helm/prometheus-adapter-values.yaml
    - repoURL: "https://github.com/YaRosyaa/my-test-cluster"
      ref: my-values
      targetRevision: main
  project: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
