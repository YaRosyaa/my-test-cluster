testFramework:
  enabled: false

route:
  main:
    # -- Enables or disables the route
    enabled: true
    hostnames:
      - grafana.example.com
    parentRefs:
      name: traefik-gateway
      namespace: traefik

sidecar:
  dashboards:
    enabled: true

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

datasources:
  datasources.yaml:
  apiVersion: 1
  datasources:
    - name: VictoriaMetrics
      type: prometheus
      url: http://victoriametrics-victoria-metrics-single-server:8428
      access: proxy
      isDefault: true

assertNoLeakedSecrets: false
