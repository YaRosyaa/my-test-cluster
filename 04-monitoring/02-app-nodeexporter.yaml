apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodeexporter
  namespace: argocd
  labels:
    app: monitoring
spec:
  destination:
    name: ''
    namespace: monitoring
    server: 'https://kubernetes.default.svc'
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts"
    targetRevision: main
    chart: prometheus-node-exporter
  project: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
