apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: argocd
  labels:
    app: os
spec:
  destination:
    name: ''
    namespace: os
    server: 'https://kubernetes.default.svc'
  sources:
    - repoURL: "https://github.com/bitnami/charts"
      targetRevision: 32.4.3
      chart: kafka
      helm:
        valueFiles:
          - $my-values/05-logs/helm/kafka-values.yaml
    - repoURL: "https://github.com/YaRosyaa/my-test-cluster"
      ref: my-values
      targetRevision: main
  project: os
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
