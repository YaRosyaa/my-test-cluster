apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ca-cert
  namespace: cert-manager
spec:
  issuerRef:
    name: self-signed-issuer 
    kind: Issuer

  secretName: ca-cert
  isCA: true
  commonName: "Test CA"

  privateKey: 
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  duration: 86400h
  renewBefore: 24h
