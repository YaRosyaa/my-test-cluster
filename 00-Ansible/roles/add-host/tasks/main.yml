---
- name: Create join credentials
  when: ansible_facts["hostname"] == 'control1'
  block:
    # Check if join token exists
    - name: Get token
      ansible.builtin.shell: |
        set -o pipefail
        kubeadm token list | awk '/bootstrappers/ {print $1; exit}'
      register: join_token_1

    # Generate new token if none is available
    - name: Generate new token
      when: join_token_1 is not defined
      ansible.builtin.command: kubeadm token create
      register: join_token_2

    - name: Select token
      ansible.builtin.set_fact:
        join_token: "{{ join_token_1 | default(join_token_2) }}"

    - name: Get CA hash
      ansible.builtin.shell: |
        set -o pipefail
        openssl x509 -pubkey -in /etc/kubernetes/pki/ca.crt | openssl rsa -pubin -outform der 2>/dev/null | openssl dgst -sha256 -hex | sed 's/^.* //'
      register: discovery_token_ca_cert_hash

    - name: Upload certificates
      ansible.builtin.shell: |
        set -o pipefail
        kubeadm init phase upload-certs --upload-certs | tail -1
      register: certificate_key

    - name: Get master node IP
      ansible.builtin.shell: |
        set -o pipefail
        kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' | cut -c9-
      register: join_path

- name: Add master node to cluster
  when: ansible_facts["hostname"] != 'control1' and "control_plane" in group_names
  block:
    - name: Check if kubeadm has already ran
      ansible.builtin.stat:
        path: "/etc/kubernetes/pki/ca.key"
      register: kubeadm_ca

    - name: Join cluster - control-plane
      when: not kubeadm_ca.stat.exists
      ansible.builtin.shell: |
        kubeadm join {{ hostvars[groups['control_plane'][0]].join_path.stdout }} \
        --token {{ hostvars[groups['control_plane'][0]].join_token.stdout }} \
        --discovery-token-ca-cert-hash sha256:{{ hostvars[groups['control_plane'][0]].discovery_token_ca_cert_hash.stdout }} \
        --control-plane --certificate-key {{ hostvars[groups['control_plane'][0]].certificate_key.stdout }}
      register: kubeadm_output

    - name: Save kubeadm logs
      ansible.builtin.copy:
        content: "{{ kubeadm_output }}"
        dest: "/home/{{ ansible_user }}/kubeadm_output.log"

- name: Add worker node to cluster
  when: '"workers" in group_names'
  block:
    - name: Check if kubeadm has already ran
      ansible.builtin.stat:
        path: "/etc/kubernetes/pki/ca.key"
      register: kubeadm_ca

    - name: Join cluster - workers
      when: not kubeadm_ca.stat.exists
      ansible.builtin.shell: |
        kubeadm join {{ hostvars[groups['control_plane'][0]].join_path.stdout }} \
        --token {{ hostvars[groups['control_plane'][0]].join_token.stdout }} \
        --discovery-token-ca-cert-hash sha256:{{ hostvars[groups['control_plane'][0]].discovery_token_ca_cert_hash.stdout }} \
        --certificate-key {{ hostvars[groups['control_plane'][0]].certificate_key.stdout }}
      register: kubeadm_output

    - name: Save kubeadm logs
      ansible.builtin.copy:
        content: "{{ kubeadm_output }}"
        dest: "/home/{{ ansible_user }}/kubeadm_output.log"
